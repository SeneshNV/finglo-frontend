name: Build and Deploy finglo-frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/seneshnv/finglo-frontend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/seneshnv/finglo-frontend:latest
            docker stop finglo-frontend || true
            docker rm finglo-frontend || true
            docker run -d \
              --name finglo-frontend \
              --network finglo-network \
              --restart always \
              -p 3000:3000 \
              -e NEXT_PUBLIC_API_URL=http://api.finglo.lk/api \
              ghcr.io/seneshnv/finglo-frontend:latest
